security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: "auto"

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: App\Entity\Membre
                property: username

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\LoginFormAuthenticator
            logout:
                path: app_logout
                # where to redirect after logout
                target: app_login

            # Activate different ways to authenticate:
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    access_control:
        # Public
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }

        # Admin only
        - { path: ^/admin, roles: ROLE_ADMIN }

        # Lecture seule pour tout le monde connecté
        # Écriture réservée aux admins (POST = créer/modifier/supprimer)
        - { path: ^/pilote, roles: ROLE_ADMIN, methods: [POST] }
        - { path: ^/pilote/new, roles: ROLE_ADMIN }
        - { path: ^/pilote/.+/edit, roles: ROLE_ADMIN }

        - { path: ^/ecurie, roles: ROLE_ADMIN, methods: [POST] }
        - { path: ^/ecurie/new, roles: ROLE_ADMIN }
        - { path: ^/ecurie/.+/edit, roles: ROLE_ADMIN }

        - { path: ^/circuit, roles: ROLE_ADMIN, methods: [POST] }
        - { path: ^/circuit/new, roles: ROLE_ADMIN }
        - { path: ^/circuit/.+/edit, roles: ROLE_ADMIN }

        - { path: ^/grand-prix, roles: ROLE_ADMIN, methods: [POST] }
        - { path: ^/grand-prix/new, roles: ROLE_ADMIN }
        - { path: ^/grand-prix/.+/edit, roles: ROLE_ADMIN }

        - { path: ^/voiture, roles: ROLE_ADMIN, methods: [POST] }
        - { path: ^/voiture/new, roles: ROLE_ADMIN }
        - { path: ^/voiture/.+/edit, roles: ROLE_ADMIN }

        - { path: ^/meteo, roles: ROLE_ADMIN, methods: [POST] }
        - { path: ^/meteo/new, roles: ROLE_ADMIN }
        - { path: ^/meteo/.+/edit, roles: ROLE_ADMIN }

        - { path: ^/participant, roles: ROLE_ADMIN, methods: [POST] }
        - { path: ^/participant/new, roles: ROLE_ADMIN }
        - { path: ^/participant/.+/edit, roles: ROLE_ADMIN }

        # Tout le reste : connecté
        - { path: ^/, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
